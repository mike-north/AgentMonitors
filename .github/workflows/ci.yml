name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Check And Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      # Issue #285: validates every published TS package's checked-in API report
      # (api-report/*.api.md) against its actual compiled surface. Runs without
      # `--local`, so an unintentional public-type change fails this step until
      # the report is regenerated (`pnpm fix:api-report`) and reviewed. The
      # `check:api-report`/`fix:api-report` npm scripts pass `--parallel=1` to
      # `nx run-many`: each package's script independently re-emits its own
      # declarations before invoking API Extractor, and `@agentmonitors/core`'s
      # `build` target (which every plugin's `^build` dependency pulls in) writes
      # into the same `dist/` folder — running both concurrently raced and
      # produced a transient `ENOENT` on `dist/index.d.ts.map`.
      - name: Check (API report drift)
        run: pnpm check:api-report

      - name: Test
        run: pnpm test

      - name: Test (serial daemon-spawn)
        run: pnpm test:serial

      - name: Test (build script source coverage)
        run: pnpm test:scripts

      - name: Test (standalone consumer)
        run: pnpm test:standalone-consumer

      # Issue #276: proves the product works from a truly fresh environment —
      # global npm install of the packed launcher, project setup, a monitor
      # firing, delivered through the real Claude Code hook stdin/stdout
      # contract (docs/specs/006-agent-integration.md §5). Runs per-PR: the
      # measured runtime (~50-70s) is comparable to the standalone-consumer
      # step above, and to the Docker-backed daemon tests (`*.docker.test.ts`)
      # that already run inside the generic "Test" step — there is no
      # separate Docker smoke job in this workflow.
      - name: Test (E2E fresh-environment install-to-first-signal, hooks path)
        run: pnpm test:e2e-fresh-install-hooks

  # Guards the failure class in ENG_TEAM_INSTRUCTIONS.md rule 8: a package
  # missing CHANGELOG.md, publishConfig, or a built entry point has broken
  # the release pipeline at release time (crashing the changesets action)
  # rather than at PR time. This detects "should this PR even run the
  # dry-run" cheaply, without a full pnpm install, so docs-only PRs skip it.
  release-collateral-changed:
    name: Detect Release-Collateral Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for release-collateral-relevant changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          pattern='^(libs/core/|plugins/source-api-poll/|plugins/source-command-poll/|plugins/source-file-fingerprint/|plugins/source-incoming-changes/|plugins/source-schedule/|apps/cli/|apps/agentmonitors/|scripts/|\.github/workflows/(release|ci)\.yml)'
          files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          echo "Changed files:"
          echo "$files"
          if echo "$files" | grep -Eq "$pattern"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # AC1: runs the publish dry-run (after the required build) on PRs that
  # touch publishable package directories, scripts/, or the release
  # workflow, path-filtered so docs-only PRs don't pay the cost. Always runs
  # on push to main / workflow_dispatch — this is the actual pre-release
  # checkpoint, since Release.yml only fires after this workflow succeeds.
  # No npm auth/registry write is required: `npm pack --dry-run` and
  # `npm view` (unauthenticated registry read) are the only network/process
  # calls made.
  publish-dry-run:
    name: Publish Dry-Run Guard
    needs: release-collateral-changed
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.release-collateral-changed.outputs.changed == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm build

      - name: Publish dry-run (validates release collateral)
        run: pnpm publish:packages:dry-run

      - name: Publish dry-run collateral tests
        run: pnpm test:scripts

  # Website is excluded from the workspace-root `pnpm build`/`check` targets (it has its
  # own build cycle — see apps/website/README.md), so it otherwise gets zero CI coverage
  # on a PR. Path-filtered the same way as release-collateral-changed above, so PRs that
  # don't touch the site skip the cost.
  website-changed:
    name: Detect Website Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for website changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          pattern='^(apps/website/|\.github/workflows/ci\.yml)'
          files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          echo "Changed files:"
          echo "$files"
          if echo "$files" | grep -Eq "$pattern"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # AC2 (issue #274): internal link check across every site page, run against the real
  # built-and-served site (not a hand-parsed approximation of route/anchor resolution).
  # `--check-fragments` also validates same-page anchors; the `--skip` pattern keeps
  # external links out of the hard-failure path per the issue's non-goals.
  website-link-check:
    name: Website Link Check
    needs: website-changed
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.website-changed.outputs.changed == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @agentmonitors/website build

      - name: Check internal links
        run: pnpm --filter @agentmonitors/website run check:links
