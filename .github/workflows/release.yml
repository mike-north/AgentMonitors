name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: write
  contents: write
  pull-requests: write
  # Lets the publish step exchange a GitHub Actions OIDC token for a
  # short-lived npm publish token (npm trusted publishing), which pnpm
  # prefers over the NPM_TOKEN fallback passed to the publish step below;
  # see the "Create Release Pull Request Or Publish" step below.
  id-token: write

jobs:
  release:
    name: Release Or Version Packages
    concurrency:
      group: release-main
      cancel-in-progress: false
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    # Matches the npm trusted-publisher record identity tuple for each
    # published package — see docs/release-process.md for the exact values.
    # GitHub auto-creates this environment on first use. This job also
    # creates/updates the Version PR and runs a no-op gate on every push to
    # main, so an environment protection rule here would gate ALL of those
    # runs, not just publish — split publishing into its own job first.
    environment: npm-publish
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@agentmonitors'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Registry-driven release-work gate. Derives entirely from the single
      # authoritative publishable-package inventory (`PACKAGE_DIRS` in
      # scripts/publish-release-packages.mjs) — no second, hand-maintained list
      # of manifest paths to drift from it (issue #284). The gate is true when
      # there are pending changesets OR any current workspace version is not yet
      # on its registry, so a partial publish still reconciles on the next
      # successful main CI run instead of being stranded by a later unrelated
      # commit. Emits `should-run=<bool>` to $GITHUB_OUTPUT itself.
      - name: Detect release work
        id: release-work
        shell: bash
        run: node scripts/release-gate.mjs

      - name: Create Release Pull Request Or Publish
        id: changesets
        if: steps.release-work.outputs.should-run == 'true'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm version:packages
          publish: pnpm release
          commit: Release packages
          title: Release packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # pnpm >=11.0.7 prefers OIDC trusted publishing over this token, so
          # once a package's trusted-publisher record exists this token goes
          # unused for it. It stays here as a fallback so publishes keep
          # working for packages whose records aren't registered yet. Remove
          # it (and revoke NPM_TOKEN) only after an OIDC publish + provenance
          # has been verified for every package — see docs/release-process.md.

      - name: Trigger CI For Release Pull Request
        if: |
          steps.release-work.outputs.should-run == 'true' &&
          steps.changesets.outputs.hasChangesets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/actions/workflows/ci.yml/dispatches \
            -f ref=changeset-release/main

      - name: Skip release
        if: steps.release-work.outputs.should-run != 'true'
        run: echo "No changesets or release-version package updates found on this push."
