name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release Or Version Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@agentmonitors'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect release work
        id: release-work
        shell: bash
        run: |
          set -euo pipefail

          base_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"

          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse "${base_sha}^{commit}" >/dev/null 2>&1; then
            base_sha="$(git rev-parse HEAD^)"
          fi

          if git diff "${base_sha}" "${head_sha}" -- \
              libs/core/package.json \
              plugins/source-api-poll/package.json \
              plugins/source-file-fingerprint/package.json \
              plugins/source-schedule/package.json | \
            grep -Eq '^[+-][[:space:]]+"version":'; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should-run=false" >> "$GITHUB_OUTPUT"

      - name: Create Release Pull Request Or Publish
        if: steps.release-work.outputs.should-run == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm version:packages
          publish: pnpm release
          commit: Release packages
          title: Release packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release
        if: steps.release-work.outputs.should-run != 'true'
        run: echo "No changesets or release-version package updates found on this push."
