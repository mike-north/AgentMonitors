name: Deploy Website

# GitHub-Actions-driven production deploy for apps/website (Vercel project `site`,
# agentmonitors.io). Deliberately NOT Vercel's "deploy every commit on main" git
# integration: validation runs first and gates the deploy (the `deploy` job
# `needs:` the `validate` job), so a broken site never reaches production.
#
# The gate covers the website's typecheck, its own vitest suite (including
# next.config.test.ts, which guards deployment-specific tracing behavior), and
# a production build of the exact deployed commit — all on the critical path
# before `deploy` is allowed to start (issue #286).
#
# Deploy promotes the artifact `validate` already built rather than triggering
# a second, independent remote build: `validate` runs `vercel build`, which
# produces a self-contained `.vercel/output` directory, uploads it as a
# workflow artifact, and `deploy` downloads that exact artifact and runs
# `vercel deploy --prebuilt`. This is Vercel's documented "build once, deploy
# the prebuilt output" flow (`vercel build` + `vercel deploy --prebuilt`), so
# the bits that get typechecked, tested, and built are the same bits that
# reach production — not a repeat of the same steps against the same commit.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/website/**'
      # Root/shared inputs that can change the resolved build even though they
      # live outside apps/website: the lockfile pins every dependency version
      # (next, react, markdoc, ...) the site is built with, pnpm-workspace.yaml
      # defines the workspace apps/website participates in, and root
      # package.json carries the pinned pnpm version (packageManager) and
      # workspace-wide devDependency versions the install resolves against.
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch: {}

# Never run two production deploys at once; queue rather than cancel an in-flight one.
concurrency:
  group: deploy-website-production
  cancel-in-progress: false

# Non-sensitive Vercel identifiers for the `site` project (agentmonitors.io).
# The only secret is VERCEL_TOKEN. Shared at workflow level: `validate` now
# needs them too (for `vercel build`), not just `deploy`.
env:
  VERCEL_ORG_ID: team_x4xCAqcSsXQ7yu4ojx1AzWFD
  VERCEL_PROJECT_ID: prj_hazDwikwUblJE5G6ah5ZLFiVQNAR

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The validation gate. All three steps below run against the exact
      # commit being deployed and must pass before `deploy` is allowed to
      # start (`deploy` `needs: validate`).
      - name: Type-check website
        run: pnpm --filter @agentmonitors/website check

      - name: Test website
        run: pnpm --filter @agentmonitors/website test

      - name: Install Vercel CLI
        run: npm install --global vercel@53

      # Production build of the exact commit, via Vercel's own build step so
      # the artifact below is byte-for-byte what `deploy` promotes (not a
      # separate `next build` whose output Vercel would have to rebuild from
      # again). `--yes` skips the interactive confirmation for pulling project
      # settings/env vars, matching the non-interactive pattern already used
      # by the `deploy` job below.
      - name: Build production website (exact commit)
        run: vercel build --prod --yes --cwd apps/website
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # CAUTION: `vercel build` inlines resolved Production env-var values into
      # this output, and this artifact is readable by anyone with actions:read
      # on the repo (a wider audience than the Vercel dashboard) for its
      # retention window. The site currently uses no server-side env vars; if
      # one is ever added, stop uploading the built output and rethink the
      # promotion flow (e.g. build inside the deploy job) before merging that
      # change.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-vercel-build
          path: apps/website/.vercel/output
          retention-days: 1
          if-no-files-found: error
          # upload-artifact@v4 excludes dot-files by default, but the Build
          # Output API depends on them (every functions/*.func directory is
          # configured by a hidden .vc-config.json). Without this, the deploy
          # job's `vercel deploy --prebuilt` fails with "Could not load
          # function config: .../.vc-config.json".
          include-hidden-files: true

  deploy:
    name: Deploy to Vercel (production)
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # No checkout: `vercel deploy --prebuilt` only reads the downloaded
      # `.vercel/output` artifact, not the source tree. This is the point of
      # promoting the validated artifact rather than rebuilding here.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-vercel-build
          path: apps/website/.vercel/output

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          # This job has no pnpm (it only runs npm + the Vercel CLI). setup-node@v5
          # otherwise auto-detects the repo's pnpm and fails caching with
          # "Unable to locate executable file: pnpm". Disable the auto cache here.
          package-manager-cache: false

      - name: Install Vercel CLI
        run: npm install --global vercel@53

      # Deploy the exact artifact `validate` built and typechecked/tested
      # against — no second remote build. Token is read from the VERCEL_TOKEN
      # env var (safer than a --token=… CLI arg, which can leak via process
      # listings / logs).
      - name: Deploy production (prebuilt)
        run: vercel deploy --prebuilt --prod --yes --cwd apps/website
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
