name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: write
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release Or Version Packages
    concurrency:
      group: release-main
      cancel-in-progress: false
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@agentmonitors'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect release work
        id: release-work
        shell: bash
        run: |
          set -euo pipefail

          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! base_sha="$(git rev-parse HEAD^ 2>/dev/null)"; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff "${base_sha}" HEAD -- \
              libs/core/package.json \
              plugins/source-api-poll/package.json \
              plugins/source-file-fingerprint/package.json \
              plugins/source-schedule/package.json | \
            grep -Eq '^[+-][[:space:]]+"version":'; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should-run=false" >> "$GITHUB_OUTPUT"

      - name: Create Release Pull Request Or Publish
        id: changesets
        if: steps.release-work.outputs.should-run == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm version:packages
          publish: pnpm release
          commit: Release packages
          title: Release packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger CI For Release Pull Request
        if: |
          steps.release-work.outputs.should-run == 'true' &&
          steps.changesets.outputs.hasChangesets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/actions/workflows/ci.yml/dispatches \
            -f ref=changeset-release/main

      - name: Skip release
        if: steps.release-work.outputs.should-run != 'true'
        run: echo "No changesets or release-version package updates found on this push."
