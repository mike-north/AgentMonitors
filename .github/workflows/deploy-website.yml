name: Deploy Website

# GitHub-Actions-driven production deploy for apps/website (Vercel project `site`,
# agentmonitors.io). Deliberately NOT Vercel's "deploy every commit on main" git
# integration: validation runs first and gates the deploy, so a broken site
# never reaches production.
#
# The gate covers the website's typecheck and its own vitest suite (including
# next.config.test.ts, which guards deployment-specific tracing behavior),
# both on the critical path before the deploy step can run (issue #286).
#
# The deploy is a REMOTE Vercel build (`vercel deploy --prod`, no --prebuilt),
# matching how the `site` project is configured: Vercel builds apps/website
# standalone (root directory = the app), installing its dependencies inside
# the deploy root. Do not reintroduce `vercel build` + `vercel deploy
# --prebuilt` here: in this pnpm monorepo a local `vercel build` traces
# dependencies through workspace symlinks into the repo-root .pnpm store, so
# every function's .vc-config.json filePathMap references files outside
# `.vercel/output` (../../node_modules/.pnpm/...). That output is not
# portable — deploying it fails with "Please ensure project dependencies
# have been installed" without the installed workspace on disk, and with the
# workspace present the references still escape the deploy root and fail
# Vercel-side with ENOENT on /node_modules/... (verified by dispatch runs of
# both variants). A build failure in the remote deploy still cannot break
# production: Vercel only switches the production domain after a successful
# build.
#
# Also for the archaeologists: the two-job artifact-promotion variant of the
# prebuilt flow additionally dropped every hidden .vc-config.json, because
# upload-artifact@v4 excludes dot-files unless include-hidden-files is set.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/website/**'
      # Root/shared inputs that can change the resolved build even though they
      # live outside apps/website: the lockfile pins every dependency version
      # (next, react, markdoc, ...) the site is built with, pnpm-workspace.yaml
      # defines the workspace apps/website participates in, and root
      # package.json carries the pinned pnpm version (packageManager) and
      # workspace-wide devDependency versions the install resolves against.
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch: {}

# Never run two production deploys at once; queue rather than cancel an in-flight one.
concurrency:
  group: deploy-website-production
  cancel-in-progress: false

# Non-sensitive Vercel identifiers for the `site` project (agentmonitors.io).
# The only secret is VERCEL_TOKEN.
env:
  VERCEL_ORG_ID: team_x4xCAqcSsXQ7yu4ojx1AzWFD
  VERCEL_PROJECT_ID: prj_hazDwikwUblJE5G6ah5ZLFiVQNAR

jobs:
  deploy:
    name: Validate and deploy to Vercel (production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The validation gate. Both steps run against the exact commit being
      # deployed and must pass before the deploy step can run.
      - name: Type-check website
        run: pnpm --filter @agentmonitors/website check

      - name: Test website
        run: pnpm --filter @agentmonitors/website test

      - name: Install Vercel CLI
        run: npm install --global vercel@53

      # Remote build + deploy (proven for this monorepo: the site builds
      # standalone with root = apps/website). Token is read from the
      # VERCEL_TOKEN env var (safer than a --token=… CLI arg, which can leak
      # via process listings / logs).
      - name: Deploy production
        run: vercel deploy --prod --yes --cwd apps/website
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
