name: Deploy Website

# GitHub-Actions-driven production deploy for apps/website (Vercel project `site`,
# agentmonitors.io). Deliberately NOT Vercel's "deploy every commit on main" git
# integration: validation runs first and gates the deploy, so a broken site
# never reaches production.
#
# The gate covers the website's typecheck, its own vitest suite (including
# next.config.test.ts, which guards deployment-specific tracing behavior), and
# a production build of the exact deployed commit — all on the critical path
# before the deploy step is allowed to run (issue #286).
#
# Validation and deploy run as sequential steps of ONE job so that
# `vercel deploy --prebuilt` promotes the exact `.vercel/output` that
# `vercel build` produced on the same machine — Vercel's documented
# "build once, deploy the prebuilt output" flow. The earlier design that
# split build and deploy into two jobs bridged by a workflow artifact never
# worked and cannot: in this pnpm monorepo the build output is not
# self-contained — each function's .vc-config.json `filePathMap` references
# dependency files outside `.vercel/output` (../../node_modules/.pnpm/...),
# which the CLI reads from disk at deploy time, so the deploying job needs
# the full installed workspace regardless. The artifact round-trip also
# silently dropped the hidden .vc-config.json files (upload-artifact@v4
# excludes dot-files by default) and exposed env-inlined build output to
# anyone with actions:read. Single-job promotion has none of these hazards.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/website/**'
      # Root/shared inputs that can change the resolved build even though they
      # live outside apps/website: the lockfile pins every dependency version
      # (next, react, markdoc, ...) the site is built with, pnpm-workspace.yaml
      # defines the workspace apps/website participates in, and root
      # package.json carries the pinned pnpm version (packageManager) and
      # workspace-wide devDependency versions the install resolves against.
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch: {}

# Never run two production deploys at once; queue rather than cancel an in-flight one.
concurrency:
  group: deploy-website-production
  cancel-in-progress: false

# Non-sensitive Vercel identifiers for the `site` project (agentmonitors.io).
# The only secret is VERCEL_TOKEN.
env:
  VERCEL_ORG_ID: team_x4xCAqcSsXQ7yu4ojx1AzWFD
  VERCEL_PROJECT_ID: prj_hazDwikwUblJE5G6ah5ZLFiVQNAR

jobs:
  deploy:
    name: Validate and deploy to Vercel (production)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The validation gate. All steps below run against the exact commit
      # being deployed and must pass before the deploy step can run.
      - name: Type-check website
        run: pnpm --filter @agentmonitors/website check

      - name: Test website
        run: pnpm --filter @agentmonitors/website test

      - name: Install Vercel CLI
        run: npm install --global vercel@53

      # Production build of the exact commit, via Vercel's own build step, so
      # the deploy below promotes byte-for-byte what was just validated (not a
      # separate remote build Vercel would run from source again). `--yes`
      # skips the interactive confirmation for pulling project settings.
      - name: Build production website (exact commit)
        run: vercel build --prod --yes --cwd apps/website
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Deploy the `.vercel/output` built above — no second remote build.
      # Token is read from the VERCEL_TOKEN env var (safer than a --token=…
      # CLI arg, which can leak via process listings / logs).
      - name: Deploy production (prebuilt)
        run: vercel deploy --prebuilt --prod --yes --cwd apps/website
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
